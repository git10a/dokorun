name: Uptime monitor

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check-production:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check homepage
        run: curl --fail-with-body --silent --show-error --location --retry 2 --retry-delay 5 --max-time 20 https://dokorun.com/ --output /dev/null

      - name: Check database-backed spot page
        run: |
          body="$(curl --fail-with-body --silent --show-error --location --retry 2 --retry-delay 5 --max-time 20 https://dokorun.com/spots/kokyo)"
          grep -Fq "皇居" <<< "$body"
